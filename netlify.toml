# Vigil — Netlify конфигурация
# Сайтът е статичен, няма build стъпка — публикува се коренната директория.
[build]
  publish = "."
  command = ""

# Сигурностни хедъри (по желание, добра практика)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
